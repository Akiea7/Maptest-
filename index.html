<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجارب خريطة ألك - الأساس النظيف</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <!-- خط Noto Sans Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* لون الخلفية الاحترافي (المرحلة 6) */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background-color: #FAFAFA; }
        
        /* حركة الدبوس الناعمة (المرحلة 5) */
        .bounce-marker {
            transform: translate(-50%, -80%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- دبوس منصة "ألك" (حسب مقاسات المرحلة السادسة: 34px وظل 14px) -->
    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        
        <!-- الدائرة -->
        <div class="w-[34px] h-[34px] bg-[#FF6B00] rounded-full border-[3px] border-white shadow-sm flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        
        <!-- العصا -->
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        
        <!-- الظل -->
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script>
        const MAPTILER_KEY = 'OGSDPhMzvxvYdBNPD9NE'; 

        maplibregl.setRTLTextPlugin(
            'https://unpkg.com/@mapbox/mapbox-gl-rtl-text@0.2.3/mapbox-gl-rtl-text.min.js',
            null,
            true 
        );

        // الخريطة الأساسية
        const map = new maplibregl.Map({
            container: 'map',
            // نستخدم ستايل Backdrop كبداية لأنه الأهدأ والأقرب للرصاصيات
            style: `https://api.maptiler.com/maps/backdrop/style.json?key=${MAPTILER_KEY}`,
            center: [44.3783246, 33.6668412], // الطارمية
            zoom: 17.6, // زووم احترافي
            bearing: 18, // انحراف مريح للعين
            pitch: 0,
            antialias: true, // حواف ناعمة بـ 60fps
            attributionControl: false
        });

        // حركة الدبوس الناعمة بدون مشاكل التجميد
        const centerMarker = document.getElementById('center-marker');
        
        map.on('movestart', () => {
            centerMarker.classList.add('bounce-marker');
        });

        map.on('moveend', () => {
            centerMarker.classList.remove('bounce-marker');
        });
    </script>
</body>
</html>
