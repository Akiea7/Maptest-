<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ALAK - (Native Style Tracking)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="places.js?v=8"></script>

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: #F5F5F7; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        .bounce-marker {
            transform: translate(-50%, -80%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="map"></div>

    <div class="absolute top-6 right-5 z-40 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-md flex items-center">
        <div class="w-2 h-2 rounded-full bg-green-500 ml-2"></div>
        <span class="text-sm font-bold text-gray-900">متابعة مباشرة</span>
    </div>

    <div class="absolute bottom-0 w-full bg-white rounded-t-[24px] shadow-[0_-4px_15px_rgba(0,0,0,0.08)] pb-8 pt-3 z-40">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full mx-auto mb-5"></div>
        <div class="px-5">
            <div class="flex items-center">
                <div class="w-14 h-14 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center text-2xl font-bold text-[#0088FF] ml-4">أ</div>
                <div class="flex-1">
                    <h3 class="text-lg font-bold text-gray-900 mb-0.5">الكابتن أحمد</h3>
                    <p class="text-xs text-gray-500">تويوتا كامري • أبيض • ١٢٣٤٥</p>
                </div>
                <div class="bg-yellow-50 px-3 py-1 rounded-xl text-sm font-bold text-yellow-600">⭐ 4.9</div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-[110px] left-4 z-30 text-[11px] text-gray-500 font-sans leading-snug pointer-events-none select-none drop-shadow-sm flex flex-col items-start" dir="ltr">
        <div class="font-semibold text-gray-600">© ALAK</div>
        <div>© OpenStreetMap</div>
    </div>

    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        <div class="w-[34px] h-[34px] bg-[#1E3A8A] rounded-full border-[3px] border-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script src="TrackingScreen.js"></script>
</body>
</html>
