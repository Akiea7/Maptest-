<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ألك - ستايل بلي مع الحقوق</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        
        .bounce-marker {
            transform: translate(-50%, -80%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="map"></div>

    <!-- حقوق تطبيق ألك والخريطة -->
    <div class="absolute bottom-6 left-4 z-30 text-[11px] text-gray-500 font-sans leading-snug pointer-events-none select-none drop-shadow-sm">
        <div class="font-semibold text-gray-600">© Alek</div>
        <div>© OpenStreetMap</div>
    </div>

    <!-- دبوس ألك الاحترافي (لون داكن مميز) -->
    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        <!-- تم تغيير اللون هنا إلى #1E3A8A (أزرق داكن/كحلي فخم) -->
        <div class="w-[34px] h-[34px] bg-[#1E3A8A] rounded-full border-[3px] border-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script>
        maplibregl.setRTLTextPlugin(
            'https://unpkg.com/@mapbox/mapbox-gl-rtl-text@0.2.3/mapbox-gl-rtl-text.min.js',
            null,
            true 
        );

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/liberty', 
            center: [44.3783246, 33.6668412], // الطارمية
            zoom: 17.6,
            bearing: 18,
            pitch: 0,
            antialias: true,
            attributionControl: false // طفينا حقوق MapLibre الافتراضية لأن سوينا حقوقنا الخاصة
        });

        const centerMarker = document.getElementById('center-marker');
        map.on('movestart', () => centerMarker.classList.add('bounce-marker'));
        map.on('moveend', () => centerMarker.classList.remove('bounce-marker'));

        map.on('load', () => {
            const layers = map.getStyle().layers;
            
            layers.forEach(layer => {
                try {
                    // الخلفية والمباني
                    if (layer.id.includes('background')) {
                        map.setPaintProperty(layer.id, 'background-color', '#EBEBEB');
                    } 
                    else if (layer.id.includes('building')) {
                        map.setPaintProperty(layer.id, 'fill-color', '#E3E3E3');
                    }

                    // إدارة الشوارع
                    else if (layer.type === 'line' && (layer.id.includes('highway') || layer.id.includes('road') || layer.id.includes('bridge') || layer.id.includes('tunnel'))) {
                        
                        const isMinorRoad = layer.id.includes('minor') || 
                                            layer.id.includes('residential') || 
                                            layer.id.includes('service') || 
                                            layer.id.includes('unclassified') || 
                                            layer.id.includes('path') || 
                                            layer.id.includes('pedestrian');

                        const isCasing = layer.id.includes('case') || 
                                         layer.id.includes('casing') || 
                                         layer.id.includes('outline') || 
                                         layer.id.includes('bg') || 
                                         layer.id.includes('border') || 
                                         layer.id.includes('shadow');

                        if (isMinorRoad) {
                            if (isCasing) {
                                map.setPaintProperty(layer.id, 'line-color', '#EBEBEB'); 
                            } else {
                                map.setPaintProperty(layer.id, 'line-color', '#FFFFFF'); 
                            }
                        } else {
                            if (isCasing) {
                                map.setPaintProperty(layer.id, 'line-color', '#8B95A5'); 
                            } else {
                                map.setPaintProperty(layer.id, 'line-color', '#D0D9E0'); 
                            }
                        }
                    }
                } catch (error) {
                    // تجاهل
                }
            });
        });

    </script>
</body>
</html>
