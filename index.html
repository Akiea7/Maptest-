<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ALAK - (Native Style Tracking)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- قراءة ملف الأماكن الخارجي -->
    <script src="places.js?v=8"></script>

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: #F5F5F7; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        .bounce-marker {
            transform: translate(-50%, -80%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="map"></div>

    <!-- شريط الحالة العلوي -->
    <div class="absolute top-6 right-5 z-40 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-md flex items-center">
        <div class="w-2 h-2 rounded-full bg-green-500 ml-2"></div>
        <span class="text-sm font-bold text-gray-900">متابعة مباشرة</span>
    </div>

    <!-- البطاقة السفلية (معلومات الكابتن) -->
    <div class="absolute bottom-0 w-full bg-white rounded-t-[24px] shadow-[0_-4px_15px_rgba(0,0,0,0.08)] pb-8 pt-3 z-40">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full mx-auto mb-5"></div>
        <div class="px-5">
            <div class="flex items-center">
                <div class="w-14 h-14 rounded-full bg-blue-50 border border-blue-100 flex items-center justify-center text-2xl font-bold text-[#0088FF] ml-4">أ</div>
                <div class="flex-1">
                    <h3 class="text-lg font-bold text-gray-900 mb-0.5">الكابتن أحمد</h3>
                    <p class="text-xs text-gray-500">تويوتا كامري • أبيض • ١٢٣٤٥</p>
                </div>
                <div class="bg-yellow-50 px-3 py-1 rounded-xl text-sm font-bold text-yellow-600">⭐ 4.9</div>
            </div>
        </div>
    </div>

    <!-- حقوق النشر -->
    <div class="absolute bottom-[110px] left-4 z-30 text-[11px] text-gray-500 font-sans leading-snug pointer-events-none select-none drop-shadow-sm flex flex-col items-start" dir="ltr">
        <div class="font-semibold text-gray-600">© ALAK</div>
        <div>© OpenStreetMap</div>
    </div>

    <!-- دبوس ALAK -->
    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        <div class="w-[34px] h-[34px] bg-[#1E3A8A] rounded-full border-[3px] border-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script>
        maplibregl.setRTLTextPlugin(
            'https://unpkg.com/@mapbox/mapbox-gl-rtl-text@0.2.3/mapbox-gl-rtl-text.min.js',
            null,
            true 
        );

        const ROUTE_COORDS = [
            [44.3783246, 33.6668412],
            [44.3792000, 33.6672000],
            [44.3805000, 33.6678000],
            [44.3820000, 33.6685000],
            [44.3835000, 33.6692000]
        ];

        const map = new maplibregl.Map({
            container: 'map',
            style: 'alak-style.json?v=3',
            center: ROUTE_COORDS[0], 
            zoom: 16.5,
            bearing: 45, 
            pitch: 45,   
            antialias: true,
            attributionControl: false 
        });

        const centerMarker = document.getElementById('center-marker');
        map.on('movestart', () => centerMarker.classList.add('bounce-marker'));
        map.on('moveend', () => centerMarker.classList.remove('bounce-marker'));

        map.on('load', () => {
            // 1. تحميل طبقة الأماكن (places.js)
            if (typeof alakPlaces !== 'undefined') {
                let safeMapFont = ['Noto Sans Regular'];
                const styleLayers = map.getStyle().layers;
                for (let i = 0; i < styleLayers.length; i++) {
                    if (styleLayers[i].type === 'symbol' && styleLayers[i].layout && styleLayers[i].layout['text-font']) {
                        safeMapFont = styleLayers[i].layout['text-font'];
                        break;
                    }
                }

                map.addSource('alak-custom-places', {
                    'type': 'geojson',
                    'data': alakPlaces 
                });

                map.addLayer({
                    'id': 'alak-places-layer',
                    'type': 'symbol',
                    'source': 'alak-custom-places',
                    'minzoom': 13, 
                    'layout': {
                        'icon-image': ['concat', ['get', 'icon'], '_11'],
                        'icon-size': 1.1,
                        'text-field': ['get', 'title'],
                        'text-font': safeMapFont, 
                        'text-size': ['interpolate', ['linear'], ['zoom'], 14, 11, 17, 13, 20, 16],
                        'symbol-sort-key': ['coalesce', ['get', 'priority'], 10],
                        'text-offset': [0, 1.2],
                        'text-anchor': 'top',
                        'icon-allow-overlap': false, 
                        'text-allow-overlap': false, 
                        'icon-padding': 2, 
                        'text-padding': 2,
                        'icon-optional': true 
                    },
                    'paint': {
                        'text-color': '#4a4a4a', 
                        'text-halo-color': '#ffffff',
                        'text-halo-width': 2
                    }
                });
            }

            // 2. تحميل المسار والسيارة
            map.loadImage('car-icon.png', (error, image) => {
                let finalIconId = 'car_11'; 
                if (!error) {
                    map.addImage('car-top-view', image);
                    finalIconId = 'car-top-view';
                }

                map.addSource('routeSource', {
                    'type': 'geojson',
                    'data': { 'type': 'Feature', 'properties': {}, 'geometry': { 'type': 'LineString', 'coordinates': ROUTE_COORDS } }
                });

                map.addLayer({
                    'id': 'routeCasing',
                    'type': 'line',
                    'source': 'routeSource',
                    'layout': { 'line-cap': 'round', 'line-join': 'round' },
                    'paint': { 'line-color': '#1e3a5f', 'line-width': 10, 'line-opacity': 0.8 }
                });

                map.addLayer({
                    'id': 'routeCore',
                    'type': 'line',
                    'source': 'routeSource',
                    'layout': { 'line-cap': 'round', 'line-join': 'round' },
                    'paint': { 'line-color': '#0088FF', 'line-width': 5 }
                });

                map.addSource('captainSource', {
                    'type': 'geojson',
                    'data': {
                        'type': 'Feature',
                        'properties': { 'bearing': 45 },
                        'geometry': { 'type': 'Point', 'coordinates': ROUTE_COORDS[0] }
                    }
                });

                map.addLayer({
                    'id': 'captainPulse',
                    'type': 'circle',
                    'source': 'captainSource',
                    'paint': { 'circle-radius': 22, 'circle-color': '#0088FF', 'circle-opacity': 0.2, 'circle-pitch-alignment': 'map' }
                });

                // طبقة السيارة مع الحجم الديناميكي
                map.addLayer({
                    'id': 'captainIcon',
                    'type': 'symbol',
                    'source': 'captainSource',
                    'layout': {
                        'icon-image': finalIconId, 
                        'icon-size': [
                            'interpolate', ['linear'], ['zoom'],
                            13, finalIconId === 'car-top-view' ? 0.05 : 0.6,
                            16, finalIconId === 'car-top-view' ? 0.15 : 1.2,
                            20, finalIconId === 'car-top-view' ? 0.35 : 2.2
                        ],
                        'icon-pitch-alignment': 'map', 
                        'icon-rotation-alignment': 'map',
                        'icon-rotate': ['get', 'bearing'], 
                        'icon-allow-overlap': true,
                        'icon-ignore-placement': true
                    }
                });

                // 3. المحاكاة الانسيابية (بدون تقفيز)
                let currentIndex = 0;
                let step = 0;
                const stepsPerSegment = 60; // عدد الخطوات بين كل نقطتين لنعومة الحركة
                
                function animateCar() {
                    if (currentIndex < ROUTE_COORDS.length - 1) {
                        const current = ROUTE_COORDS[currentIndex];
                        const next = ROUTE_COORDS[currentIndex + 1];
                        
                        const dx = next[0] - current[0];
                        const dy = next[1] - current[1];
                        const angle = (Math.atan2(dy, dx) * 180) / Math.PI;
                        const bearing = (angle + 90 + 360) % 360;

                        const progress = step / stepsPerSegment;
                        
                        const lng = current[0] + (next[0] - current[0]) * progress;
                        const lat = current[1] + (next[1] - current[1]) * progress;

                        map.getSource('captainSource').setData({
                            'type': 'Feature',
                            'properties': { 'bearing': bearing },
                            'geometry': { 'type': 'Point', 'coordinates': [lng, lat] }
                        });

                        map.jumpTo({ 
                            center: [lng, lat], 
                            bearing: bearing 
                        });

                        step++;
                        
                        if (step >= stepsPerSegment) {
                            step = 0;
                            currentIndex++;
                        }
                    } else {
                        currentIndex = 0;
                        step = 0;
                    }
                    
                    requestAnimationFrame(animateCar);
                }
                
                // تشغيل المحرك
                animateCar();
            });
        });
    </script>
</body>
</html>
