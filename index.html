<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ALAK - خريطة الأماكن (النسخة المستقرة)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- استدعاء ملف الأماكن -->
    <script src="places.js?v=2"></script>

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        
        .bounce-marker {
            transform: translate(-50%, -80%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="map"></div>

    <!-- حقوق تطبيق ALAK -->
    <div class="absolute bottom-12 left-4 z-30 text-[11px] text-gray-500 font-sans leading-snug pointer-events-none select-none drop-shadow-sm flex flex-col items-start" dir="ltr">
        <div class="font-semibold text-gray-600">© ALAK</div>
        <div>© OpenStreetMap</div>
    </div>

    <!-- دبوس ALAK الاحترافي -->
    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        <div class="w-[34px] h-[34px] bg-[#1E3A8A] rounded-full border-[3px] border-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script>
        maplibregl.setRTLTextPlugin(
            'https://unpkg.com/@mapbox/mapbox-gl-rtl-text@0.2.3/mapbox-gl-rtl-text.min.js',
            null,
            true 
        );

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/liberty', 
            center: [44.3783246, 33.6668412], 
            zoom: 15.5,
            bearing: 18,
            pitch: 0,
            antialias: true,
            attributionControl: false 
        });

        const centerMarker = document.getElementById('center-marker');
        map.on('movestart', () => centerMarker.classList.add('bounce-marker'));
        map.on('moveend', () => centerMarker.classList.remove('bounce-marker'));

        function applyMapStyling(mapInstance) {
            const layers = mapInstance.getStyle().layers;
            layers.forEach(layer => {
                try {
                    const id = layer.id;
                    if (id.includes('background')) mapInstance.setPaintProperty(id, 'background-color', '#E2E5E9');
                    else if (id.includes('water')) mapInstance.setPaintProperty(id, 'fill-color', '#C3D8E6');
                    else if (id.includes('park') || id.includes('green') || id.includes('pitch')) mapInstance.setPaintProperty(id, 'fill-color', '#CFE1D4');
                    else if (id.includes('building')) mapInstance.setPaintProperty(id, 'fill-color', '#D5D9DE');
                    else if (layer.type === 'line' && (id.includes('highway') || id.includes('road') || id.includes('bridge') || id.includes('tunnel'))) {
                        const isMinorRoad = id.includes('minor') || id.includes('residential') || id.includes('service') || id.includes('unclassified') || id.includes('path') || id.includes('pedestrian');
                        const isCasing = id.includes('case') || id.includes('casing') || id.includes('outline') || id.includes('bg') || id.includes('border') || id.includes('shadow');

                        if (isMinorRoad) {
                            if (isCasing) mapInstance.setPaintProperty(id, 'line-color', '#E2E5E9'); 
                            else mapInstance.setPaintProperty(id, 'line-color', '#FFFFFF'); 
                        } else {
                            if (isCasing) mapInstance.setPaintProperty(id, 'line-color', '#A5B1C2'); 
                            else mapInstance.setPaintProperty(id, 'line-color', '#FDF2D6'); 
                        }
                    }
                } catch (e) {}
            });
        }

        map.on('load', () => {
            applyMapStyling(map);

            if (typeof alakPlaces !== 'undefined') {
                
                // 1. استخراج خط آمن ومدعوم 100% من الخريطة نفسها
                let safeMapFont = ['Noto Sans Regular']; // خط احتياطي
                const styleLayers = map.getStyle().layers;
                for (let i = 0; i < styleLayers.length; i++) {
                    if (styleLayers[i].type === 'symbol' && styleLayers[i].layout && styleLayers[i].layout['text-font']) {
                        safeMapFont = styleLayers[i].layout['text-font'];
                        break; // بس نلزم خط شغال، نتوقف
                    }
                }

                // 2. إضافة مصدر البيانات
                map.addSource('alak-custom-places', {
                    'type': 'geojson',
                    'data': alakPlaces
                });

                // 3. طبقة النقاط الزرقاء (مستقرة ولا تنهار)
                map.addLayer({
                    'id': 'alak-places-points',
                    'type': 'circle',
                    'source': 'alak-custom-places',
                    'paint': {
                        'circle-radius': 5,
                        'circle-color': '#1E3A8A',
                        'circle-stroke-width': 2,
                        'circle-stroke-color': '#ffffff'
                    }
                });

                // 4. طبقة النصوص باستخدام الخط الآمن المستخرج
                map.addLayer({
                    'id': 'alak-places-labels',
                    'type': 'symbol',
                    'source': 'alak-custom-places',
                    'layout': {
                        'text-field': ['get', 'title'],
                        'text-font': safeMapFont, // استخدام الخط المسروق والآمن
                        'text-offset': [0, 1.2],
                        'text-anchor': 'top',
                        'text-size': 13,
                        'text-allow-overlap': false
                    },
                    'paint': {
                        'text-color': '#1E3A8A',
                        'text-halo-color': '#ffffff',
                        'text-halo-width': 2
                    }
                });
            }
        });
    </script>
</body>
</html>
