<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ALAK - ستايل بلي الاحترافي (نسخة الماستر)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        
        .bounce-marker {
            transform: translate(-50%, -80%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="map"></div>

    <!-- حقوق تطبيق ALAK والخريطة -->
    <div class="absolute bottom-12 left-4 z-30 text-[11px] text-gray-500 font-sans leading-snug pointer-events-none select-none drop-shadow-sm flex flex-col items-start" dir="ltr">
        <div class="font-semibold text-gray-600">© ALAK</div>
        <div>© OpenStreetMap</div>
    </div>

    <!-- دبوس ALAK الاحترافي -->
    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        <div class="w-[34px] h-[34px] bg-[#1E3A8A] rounded-full border-[3px] border-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script>
        maplibregl.setRTLTextPlugin(
            'https://unpkg.com/@mapbox/mapbox-gl-rtl-text@0.2.3/mapbox-gl-rtl-text.min.js',
            null,
            true 
        );

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/liberty', 
            center: [44.3783246, 33.6668412], // الطارمية
            zoom: 17.6,
            bearing: 18,
            pitch: 0,
            antialias: true,
            attributionControl: false 
        });

        const centerMarker = document.getElementById('center-marker');
        map.on('movestart', () => centerMarker.classList.add('bounce-marker'));
        map.on('moveend', () => centerMarker.classList.remove('bounce-marker'));

        // ==========================================
        // تنظيم الكود بدوال منفصلة (حسب نصيحة صديقك)
        // ==========================================

        function applyMapStyling(mapInstance) {
            const layers = mapInstance.getStyle().layers;

            layers.forEach(layer => {
                try {
                    const id = layer.id;

                    // 1. الخلفية والمياه والحدائق
                    if (id.includes('background')) {
                        mapInstance.setPaintProperty(id, 'background-color', '#EBEBEB');
                    } 
                    else if (id.includes('water')) {
                        mapInstance.setPaintProperty(id, 'fill-color', '#D8EAFB');
                    }
                    else if (id.includes('park') || id.includes('green') || id.includes('pitch')) {
                        mapInstance.setPaintProperty(id, 'fill-color', '#DCEFD7');
                    }

                    // 2. المباني (اللون الجديد المقترح #F2EEE8)
                    else if (id.includes('building')) {
                        mapInstance.setPaintProperty(id, 'fill-color', '#F2EEE8');
                    }

                    // 3. إخفاء الـ POI المزعجة (محلات، مدارس، إلخ) للحفاظ على نظافة الخريطة
                    else if (id.includes('poi') || id.includes('landuse_overlay') || id.includes('amenity')) {
                        if (mapInstance.getLayer(id)) {
                            mapInstance.setLayoutProperty(id, 'visibility', 'none');
                        }
                    }

                    // 4. تطبيق الخط العربي Noto Sans Arabic على النصوص
                    else if (layer.type === 'symbol' && layer.layout && layer.layout['text-field']) {
                        mapInstance.setLayoutProperty(id, 'text-font', ['Noto Sans Arabic Regular', 'Open Sans Regular']);
                    }

                    // 5. هندسة الشوارع المتقدمة (Road Hierarchy & Casing)
                    else if (layer.type === 'line' && (id.includes('highway') || id.includes('road') || id.includes('bridge') || id.includes('tunnel'))) {
                        
                        const isMinorRoad = id.includes('minor') || 
                                            id.includes('residential') || 
                                            id.includes('service') || 
                                            id.includes('unclassified') || 
                                            id.includes('path') || 
                                            id.includes('pedestrian');

                        const isCasing = id.includes('case') || 
                                         id.includes('casing') || 
                                         id.includes('outline') || 
                                         id.includes('bg') || 
                                         id.includes('border') || 
                                         id.includes('shadow');

                        if (isMinorRoad) {
                            if (isCasing) {
                                mapInstance.setPaintProperty(id, 'line-color', '#EBEBEB'); 
                            } else {
                                mapInstance.setPaintProperty(id, 'line-color', '#FFFFFF'); // فرعية بيضاء
                            }
                        } else {
                            if (isCasing) {
                                mapInstance.setPaintProperty(id, 'line-color', '#E6E6E6'); // تحديد هادئ
                            } else {
                                mapInstance.setPaintProperty(id, 'line-color', '#F7F8FA'); // رئيسية بلون ناعم
                            }
                        }
                    }
                } catch (e) {
                    // تتبع الأخطاء بدقة لمعرفة أي طبقة لم تقبل التعديل (حسب نصيحة صديقك)
                    console.warn(`Layer failed: ${layer.id}`, e);
                }
            });
        }

        map.on('load', () => {
            applyMapStyling(map);
        });

    </script>
</body>
</html>
