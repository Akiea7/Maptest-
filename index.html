<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق ALAK - (Native Style Tracking)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script> <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="places.js?v=8"></script>

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: #111827; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0; }
        .bounce-marker { transform: translate(-50%, -80%) scale(1.05) !important; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .live-pulse { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="map"></div>

    <div class="absolute top-4 right-4 z-20 w-80 bg-gray-900/80 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-5 shadow-2xl">
        <div class="flex items-center justify-between mb-4 border-b border-gray-700/50 pb-3">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-full live-pulse"></div>
                <span class="text-sm font-bold text-green-400 tracking-wider">مباشر LIVE</span>
            </div>
            <span class="text-xs text-gray-300 bg-gray-800 px-2 py-1 rounded-lg">ألك - ALAK</span>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center text-white">
                <span class="text-gray-400 text-sm">الكابتن</span>
                <span class="font-bold text-lg">أحمد محمد</span>
            </div>
            
            <div class="grid grid-cols-2 gap-3 text-white">
                <div class="bg-gray-800/70 rounded-xl p-3 border border-gray-600/30">
                    <div class="text-gray-400 text-xs mb-1">السرعة الحالية</div>
                    <div class="flex items-baseline gap-1">
                        <span id="speed-display" class="text-2xl font-extrabold text-blue-400">0</span>
                        <span class="text-xs text-gray-500">كم/س</span>
                    </div>
                </div>
                <div class="bg-gray-800/70 rounded-xl p-3 border border-gray-600/30">
                    <div class="text-gray-400 text-xs mb-1">المسافة المتبقية</div>
                    <div class="flex items-baseline gap-1">
                        <span id="distance-display" class="text-2xl font-extrabold text-emerald-400">0.0</span>
                        <span class="text-xs text-gray-500">كم</span>
                    </div>
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between text-xs text-gray-400">
                    <span>تقدم الرحلة</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-l from-blue-500 to-cyan-400 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="mt-5 flex gap-2">
            <button onclick="toggleAnimation()" id="pause-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2.5 rounded-xl transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                إيقاف مؤقت
            </button>
        </div>
    </div>

    <div id="loading-screen" class="absolute inset-0 z-50 bg-gray-900 flex flex-col items-center justify-center transition-opacity duration-500 text-white">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-gray-400 text-sm">جاري تهيئة نظام ألك...</p>
    </div>

    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[65%] z-10 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        <div class="w-[34px] h-[34px] bg-[#1E3A8A] rounded-full border-[3px] border-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        <div class="w-[2.5px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script src="TrackingScreen.js"></script>
</body>
</html>
