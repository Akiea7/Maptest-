<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألك - النسخة الاحترافية</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <!-- خط Noto Sans Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* (النقطة 5) لون الخلفية البديل إذا تأخر تحميل الخريطة */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background-color: #F4F5F7; }
        
        /* حركة الدبوس الناعمة */
        .bounce-marker {
            transform: translate(-50%, -75%) scale(1.05) !important;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- (النقطة 6 و 7) الدبوس المحدث: 34px، عصا أطول، وظل 14px مع بلور -->
    <div id="center-marker" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[60%] z-20 pointer-events-none transition-transform duration-300 flex flex-col items-center">
        
        <!-- الدائرة البرتقالية (كبرناها لـ 34px) -->
        <div class="w-[34px] h-[34px] bg-[#FF6B00] rounded-full border-[3px] border-white shadow-sm flex items-center justify-center z-10 relative">
            <div class="w-3 h-3 bg-white rounded-full"></div>
        </div>
        
        <!-- العصا الطويلة -->
        <div class="w-[2px] h-[22px] bg-[#4a4a4a] -mt-1 z-0 relative"></div>
        
        <!-- الظل الدقيق حسب طلب صديقك -->
        <div class="w-[14px] h-[6px] bg-black rounded-[50%] -mt-1 z-0" style="opacity: 0.18; filter: blur(3px);"></div>
    </div>

    <script>
        const MAPTILER_KEY = 'OGSDPhMzvxvYdBNPD9NE'; 

        maplibregl.setRTLTextPlugin(
            'https://unpkg.com/@mapbox/mapbox-gl-rtl-text@0.2.3/mapbox-gl-rtl-text.min.js',
            null,
            true 
        );

        // الخريطة الاحترافية (بدون أي دوال ترقيع الألوان!)
        const map = new maplibregl.Map({
            container: 'map',
            // (النقطة 1) استخدام ستايل Backdrop كبداية هادئة
            // ملاحظة: لاحقاً من تسوي ستايلك الخاص بـ MapTiler Cloud، بس جيب الرابط مالته وخليه هنا!
            style: `https://api.maptiler.com/maps/backdrop/style.json?key=${MAPTILER_KEY}`,
            center: [44.3783246, 33.6668412], // إحداثيات الطارمية
            zoom: 17.6, // (النقطة 10) الزووم الدقيق
            bearing: 18, // (النقطة 11) إعطاء انحراف بسيط للخريطة
            pitch: 0,
            antialias: true, // (النقطة 12) حواف الشوارع الناعمة
            attributionControl: false
        });

        const centerMarker = document.getElementById('center-marker');
        
        map.on('movestart', () => {
            centerMarker.classList.add('bounce-marker');
        });

        map.on('moveend', () => {
            centerMarker.classList.remove('bounce-marker');
        });

        // (النقطة 9) تم حذف دالة renderTestPOIs بالكامل.
    </script>
</body>
</html>
